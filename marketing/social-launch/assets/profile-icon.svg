<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">LINE101Chat profile icon</title>
  <desc id="desc">Green LINE101Chat icon for social profiles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06c755"/>
      <stop offset="0.58" stop-color="#08a94d"/>
      <stop offset="1" stop-color="#12372a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#072318" flood-opacity="0.28"/>
