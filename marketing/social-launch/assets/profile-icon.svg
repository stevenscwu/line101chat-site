  <text x="512" y="548" text-anchor="middle" font-family="'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif" font-size="72" font-weight="800" fill="#06a94f">Chat</text>
  <text x="512" y="650" text-anchor="middle" font-family="'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif" font-size="42" font-weight="700" fill="#203f35">LINE AI 知識助理</text>
