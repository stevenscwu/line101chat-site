  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <circle cx="798" cy="164" r="96" fill="#ffffff" opacity="0.18"/>
  <circle cx="171" cy="843" r="132" fill="#f7d35d" opacity="0.22"/>
