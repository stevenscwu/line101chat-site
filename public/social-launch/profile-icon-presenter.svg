<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">LINE101Chat presenter profile icon</title>
  <desc id="desc">Presenter avatar profile icon for LINE101Chat social channels.</desc>
  <defs>
    <clipPath id="avatarClip">
      <circle cx="512" cy="390" r="284"/>
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eefbf4"/>
      <stop offset="0.5" stop-color="#d8f5e6"/>
      <stop offset="1" stop-color="#06c755"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <circle cx="512" cy="390" r="304" fill="#ffffff" opacity="0.86"/>
  <image href="/presenter/host-main.png" x="210" y="78" width="604" height="604" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="132" y="698" width="760" height="178" rx="72" fill="#103526"/>
  <text x="512" y="777" text-anchor="middle" font-family="'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif" font-size="58" font-weight="800" fill="#ffffff">LINE101Chat</text>
  <text x="512" y="834" text-anchor="middle" font-family="'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif" font-size="34" font-weight="700" fill="#bdf6d0">台灣在地 LINE AI 知識助理</text>
</svg>
