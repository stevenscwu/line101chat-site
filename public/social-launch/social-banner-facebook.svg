<svg xmlns="http://www.w3.org/2000/svg" width="1640" height="624" viewBox="0 0 1640 624" role="img" aria-labelledby="title desc">
  <title id="title">LINE101Chat Facebook banner</title>
  <desc id="desc">Facebook cover banner for LINE101Chat.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fff9"/>
      <stop offset="0.58" stop-color="#e7f8ef"/>
      <stop offset="1" stop-color="#c8f0db"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="1326" cy="314" r="238"/>
    </clipPath>
  </defs>
  <rect width="1640" height="624" fill="url(#bg)"/>
  <circle cx="1420" cy="92" r="144" fill="#06c755" opacity="0.16"/>
  <circle cx="120" cy="548" r="172" fill="#f7d35d" opacity="0.22"/>
  <rect x="96" y="82" width="900" height="460" rx="36" fill="#ffffff" opacity="0.72"/>
  <text x="142" y="181" font-family="'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif" font-size="36" font-weight="800" fill="#06a94f">LINE101Chat</text>
