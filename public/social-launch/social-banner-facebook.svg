  <text x="142" y="365" font-family="'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif" font-size="38" font-weight="700" fill="#29493f">FAQ、SOP、招生資料、服務文件</text>
  <text x="142" y="423" font-family="'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif" font-size="38" font-weight="700" fill="#29493f">變成 LINE 中可即時回答的助理</text>
  <rect x="142" y="466" width="322" height="54" rx="27" fill="#06c755"/>
