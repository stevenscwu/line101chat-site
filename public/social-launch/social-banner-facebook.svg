  <circle cx="1326" cy="314" r="258" fill="#ffffff"/>
  <image href="/presenter/host-main.png" x="1076" y="54" width="500" height="520" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
